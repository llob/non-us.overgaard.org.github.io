<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ description }}">
    
    <meta property="og:title" content="{{ title }} | {{ site_title }}">
    <meta property="og:description" content="{{ description }}">
    <meta property="og:type" content="article">
    <meta property="article:published_time" content="{{ iso_date }}">
    <meta property="og:site_name" content="{{ site_title }}">
    
    <title>{{ title }} | {{ site_title }}</title>
    <link rel="icon" href="{{ relative_prefix }}assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="{{ relative_prefix }}assets/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="site-title">
                <a href="{{ relative_prefix }}">{{ site_title }}</a>
            </h1>
            <p class="site-description">{{ site_description }}</p>
        </div>
    </header>
    
    <nav class="site-navigation">
        <div class="container">
            <ul class="nav-links">
                <li><a href="{{ relative_prefix }}">Home</a></li>
                <li><a href="{{ relative_prefix }}archive.html">Archive</a></li>
            </ul>
        </div>
    </nav>
    
    <main class="site-content">
        <div class="container">
            <article class="post-full">
                <header class="post-header">
                    <h2 class="post-title">{{ title }}</h2>
                    <div class="post-meta">
                        <time datetime="{{ iso_date }}">{{ formatted_date }}</time>
                    </div>
                </header>
                
                <div class="post-content">
                    {{ html_content }}
                </div>
                
                <footer class="post-footer">
                    <p>Published on {{ formatted_date }}</p>
                </footer>
            </article>
            
            <nav class="post-navigation">
                <a href="{{ relative_prefix }}" class="back-link">&larr; Back to Home</a>
            </nav>
        </div>
    </main>
    
    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{ site_title }}</p>
        </div>
    </footer>
</body>
</html>
